name: Publicar en Facebook Automáticamente

on:
  schedule:
    # 10 AM hora Mexico (UTC-6) = 4 PM UTC
    - cron: '0 16 * * *'
    # 3 PM hora Mexico = 9 PM UTC
    - cron: '0 21 * * *'
    # 8 PM hora Mexico = 2 AM UTC (día siguiente)
    - cron: '0 2 * * *'

jobs:
  publicar:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests anthropic
    
    - name: Crear archivo .env
      env:
        SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
        SHOPIFY_API_KEY: ${{ secrets.SHOPIFY_API_KEY }}
        SHOPIFY_API_PASSWORD: ${{ secrets.SHOPIFY_API_PASSWORD }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        META_TOKEN: ${{ secrets.META_TOKEN }}
        FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
      run: |
        cat > .env << EOF
        SHOPIFY_STORE=$SHOPIFY_STORE
        SHOPIFY_API_KEY=$SHOPIFY_API_KEY
        SHOPIFY_API_PASSWORD=$SHOPIFY_API_PASSWORD
        ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
        META_TOKEN=$META_TOKEN
        FACEBOOK_PAGE_ID=$FACEBOOK_PAGE_ID
        EOF
    
    - name: Ejecutar agente
      run: python3 agente_facebook_publicador.py
    
    - name: Registrar logs
      if: always()
      run: |
        if [ -f publicaciones.jsonl ]; then
          echo "=== Últimas publicaciones ==="
          tail -5 publicaciones.jsonl
        fi
